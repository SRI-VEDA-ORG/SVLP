<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Veda Organization - Premium Letterhead Generator</title>
<link rel="icon" type="image/png" href="https://srivedaorg.online/SV_ORG_LOGO_FEVICON.png?v=2">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
<style>
:root { --sv-blue: #1e3a8a; }
* { font-family: 'Roboto Slab', serif !important; box-sizing: border-box; }
body { margin: 0; padding: 0; background-color: #f1f5f9; overflow: hidden; }

/* CM001 - Layout Structure */
.app-layout { display: flex; height: 100vh; width: 100vw; }
.sidebar { width: 420px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); flex-shrink: 0; display: flex; flex-direction: column; box-shadow: 10px 0 25px -5px rgba(0, 0, 0, 0.2); z-index: 50; }
.preview-area { flex-grow: 1; overflow-y: auto; padding: 2.5rem; background: radial-gradient(circle at center, #f8fafc 0%, #e2e8f0 100%); }

/* CM002 - Form Controls */
.input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem; }
.field-label { text-transform: uppercase; font-size: 10px; font-weight: 800; letter-spacing: 0.1em; color: #94a3b8; }
.control-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 12px 16px; border-radius: 8px; outline: none; width: 100%; transition: all 0.2s ease; font-size: 13px; }
.control-input:focus { background: rgba(255, 255, 255, 0.1); border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
textarea.control-input { resize: none; flex-grow: 1; line-height: 1.6; }
.min-h-100 { min-height: 100px; }
.min-h-250 { min-height: 250px; }

/* CM003 - Page and Print Styles */
@page { size: A4; margin: 0; }
.page { width: 210mm; height: 297mm; background: white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); position: relative; display: flex; flex-direction: column; padding: 8mm; flex-shrink: 0; transform-origin: top center; transition: transform 0.2s ease; }
@media print { body { background: none; display: block; overflow: visible !important; } .app-layout { display: block; height: auto; width: 100%; } .sidebar { display: none !important; } .preview-area { padding: 0; background: none; display: block; overflow: visible !important; } #previewContainer { gap: 0 !important; display: block !important; } .page { margin: 0 !important; box-shadow: none !important; width: 210mm; height: 297mm; transform: scale(1) !important; page-break-after: always; break-after: page; } .page:last-child { page-break-after: auto; break-after: auto; } .no-print { display: none !important; } }

/* CM004 - Inner Page Elements */
.main-border { position: relative; border: 1.5px solid var(--sv-blue); height: 100%; display: flex; flex-direction: column; padding: 5mm 12mm 2mm 12mm; background-color: #ffffff; z-index: 2; }
.main-border::after { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border: 2px double var(--sv-blue); opacity: 0.8; pointer-events: none; }

/* CM005 - Corners and Utilities */
.corner { position: absolute; width: 35px; height: 35px; z-index: 10; color: var(--sv-blue); }
.top-left { top: -2px; left: -2px; }
.top-right { top: -2px; right: -2px; transform: rotate(90deg); }
.bottom-left { bottom: -2px; left: -2px; transform: rotate(-90deg); }
.bottom-right { bottom: -2px; right: -2px; transform: rotate(180deg); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.animate-fade { animation: fadeIn 0.4s ease-out forwards; }

/* CM006 - Modal Styles */
#passwordModal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; }
</style>
</head>
<body>

<!-- CM007 - Main Application Layout -->
<div class="app-layout">

<!-- CM008 - Sidebar Controls -->
<div class="sidebar no-print">
<div class="p-6 border-b border-white/10 flex items-center gap-4">
<img src="https://sri-veda-org.github.io/SVLP/SV_ORG_LOGO.png" alt="Logo" class="w-12 h-12 rounded-full border border-white/20 shadow-lg">
<div>
<h2 class="text-lg font-black text-white tracking-wide uppercase">Workspace</h2>
<p class="text-blue-400 text-[10px] tracking-widest uppercase font-bold">Dynamic Letterhead</p>
</div>
</div>
<div class="p-6 flex flex-col flex-grow overflow-y-auto">
<div class="flex gap-4 mb-2">
<div class="input-group flex-1 mb-0">
<label class="field-label">Reference No.</label>
<input type="text" id="extRef" class="control-input" placeholder="e.g. 01" oninput="triggerUpdate()">
</div>
<div class="input-group flex-1 mb-0">
<label class="field-label">Date</label>
<input type="date" id="extDate" class="control-input" oninput="triggerUpdate()">
</div>
</div>
<div class="input-group mt-4">
<label class="field-label">Recipient Address</label>
<textarea id="extSalutation" class="control-input min-h-100" placeholder="To,&#10;Manager,&#10;Organization Name,&#10;Village" oninput="triggerUpdate()"></textarea>
</div>
<div class="input-group flex-grow mt-2 flex flex-col">
<div class="flex justify-between items-center mb-1">
<label class="field-label">Document Content</label>
<span class="text-[9px] text-blue-400/60 uppercase">Auto-Paginates</span>
</div>
<textarea id="extBody" class="control-input min-h-250" placeholder="Start typing your official correspondence here..." oninput="triggerUpdate()"></textarea>
</div>
</div>
<div class="p-6 border-t border-white/10 bg-slate-900/50">
<button onclick="askPassword()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-lg font-black uppercase text-xs tracking-widest transition shadow-lg shadow-blue-900/50">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
Print Document
</button>
</div>
</div>

<!-- CM009 - Preview Area -->
<div class="preview-area" id="previewAreaScroll">
<div id="previewContainer" class="flex flex-col gap-10 items-center w-full"></div>
</div>

</div>

<!-- CM010 - Page Template Definition -->
<template id="page-template">
<div class="page animate-fade">
<div class="main-border">
<svg class="corner top-left" viewBox="0 0 100 100" fill="currentColor"><path d="M0 0 v100 h10 v-90 h90 v-10 z M25 25 v50 h5 v-45 h45 v-5 z"/></svg>
<svg class="corner top-right" viewBox="0 0 100 100" fill="currentColor"><path d="M0 0 v100 h10 v-90 h90 v-10 z M25 25 v50 h5 v-45 h45 v-5 z"/></svg>
<svg class="corner bottom-left" viewBox="0 0 100 100" fill="currentColor"><path d="M0 0 v100 h10 v-90 h90 v-10 z M25 25 v50 h5 v-45 h45 v-5 z"/></svg>
<svg class="corner bottom-right" viewBox="0 0 100 100" fill="currentColor"><path d="M0 0 v100 h10 v-90 h90 v-10 z M25 25 v50 h5 v-45 h45 v-5 z"/></svg>
<img src="https://sri-veda-org.github.io/SVLP/SV_ORG_LOGO_FEVICON.png" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[50%] opacity-[0.03] pointer-events-none filter grayscale object-contain z-0" alt="Watermark">
<header class="flex justify-between items-center border-b-[2.5px] border-blue-900 pb-3 mb-5 mx-2 z-10 relative mt-2">
<div class="flex items-center ml-2">
<img src="https://sri-veda-org.github.io/SVLP/LP_HEADER_TOP_IMAGE.png" class="h-16 w-auto object-contain drop-shadow-lg p-1 bg-white/90 border border-gray-100 rounded">
<div class="h-12 w-[1.5px] bg-blue-900/30 ml-4 rounded"></div>
</div>
<div class="text-right flex flex-col items-end">
<h1 class="text-[26px] font-black text-blue-900 uppercase leading-none tracking-tight">Sri Veda Organization</h1>
<p class="text-[10px] font-bold text-gray-500 uppercase mt-1.5 tracking-[0.25em]">Web Design Engineer</p>
<div class="mt-2 text-right">
<p class="text-[9px] text-gray-700 font-medium leading-relaxed max-w-[270px]">1-113#A, ChakravarthulaPalli Mutyalapadu(P),<br> Chagalamarri(M), Nandyal(D), AP-518553.</p>
<div class="flex justify-end gap-3 mt-1.5 text-[9.5px] font-bold text-blue-900">
<span class="flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>9346119924</span>
<span class="flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>karimaddela143@gmail.com</span>
</div>
</div>
</div>
</header>
<main class="flex-grow flex flex-col w-full px-5 z-10 relative">
<div class="meta-container flex justify-between mb-6 text-[11px] font-bold text-gray-500 border-b border-gray-100 pb-2">
<span>REF NO: <span class="ref-display text-blue-900"></span></span>
<span>DATE: <span class="date-display text-blue-900"></span></span>

<div class="page-content w-full text-[12.5px] text-gray-800 leading-[1.8] text-justify font-medium whitespace-pre-wrap break-words"></div>
</main>
<footer class="mt-auto px-5 pt-2 border-t-[1.5px] border-blue-900/20 pb-0 z-10 relative">
<div class="text-left w-64 pt-1 mb-1">
<p class="text-[13px] font-black text-blue-900 uppercase">K Narasimha Reddy</p>
<p class="text-[10px] font-bold text-gray-700 mt-0.5">9346119924</p>
<p class="text-[9px] font-bold text-amber-600 uppercase tracking-widest mt-0.5">Sri Veda Organizer</p>
</div>
</footer>
</div>
</div>
</template>

<!-- CM011 - Password Modal -->
<div id="passwordModal" class="no-print">
<div class="bg-white p-8 rounded-2xl shadow-2xl w-80 text-center relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1.5 bg-blue-900"></div>
<h2 class="text-xl font-black text-blue-900 mb-2 uppercase tracking-wide">Secure Print</h2>
<p class="text-gray-500 text-xs mb-6 font-medium">Authentication required to generate PDF.</p>
<input type="password" id="passInput" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-center mb-4 text-xl tracking-[0.3em] font-black text-blue-900 focus:border-blue-900 outline-none transition bg-gray-50">
<p id="errorMsg" class="text-red-500 text-[10px] mb-4 hidden font-bold uppercase tracking-wider">Access Denied</p>
<div class="flex gap-2">
<button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl font-bold text-xs uppercase tracking-wider hover:bg-gray-200 transition">Cancel</button>
<button onclick="validatePassword()" class="flex-1 bg-blue-900 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-wider hover:bg-blue-800 shadow-lg shadow-blue-900/30 transition">Authorize</button>
</div>
</div>
</div>

<script>
/* CM012 - Global Variables */
let updateTimeout;

/* CM013 - Utility Functions */
function formatDocDate(d) { return d ? `${String(new Date(d).getDate()).padStart(2,'0')}-${["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][new Date(d).getMonth()]}-${new Date(d).getFullYear()}` : '__________'; }
function triggerUpdate() { clearTimeout(updateTimeout); updateTimeout = setTimeout(buildDocument, 50); }
function scalePages() { document.querySelectorAll('.page').forEach(p => { let scale = (document.querySelector('.preview-area').clientWidth - 80) / 794; if(scale < 1) { p.style.transform = `scale(${scale})`; p.style.marginBottom = `-${(1 - scale) * 1123 - 40}px`; } else { p.style.transform = 'scale(1)'; p.style.marginBottom = '2.5rem'; } }); }
function createBlankPage() { let t = document.getElementById('page-template').content.cloneNode(true); return { fragment: t, contentBox: t.querySelector('.page-content'), refDisplay: t.querySelector('.ref-display'), dateDisplay: t.querySelector('.date-display'), salutationDisplay: t.querySelector('.salutation-display'), metaContainer: t.querySelector('.meta-container') }; }

/* CM014 - Core Build Logic */
function buildDocument() { let c = document.getElementById('previewContainer'), bTxt = document.getElementById('extBody').value; c.innerHTML = ''; let p1 = createBlankPage(); p1.refDisplay.innerText = document.getElementById('extRef').value ? `REF/SVO/PR-${document.getElementById('extRef').value}` : 'REF/SVO/PR-__________'; p1.dateDisplay.innerText = formatDocDate(document.getElementById('extDate').value); p1.salutationDisplay.innerText = document.getElementById('extSalutation').value; c.appendChild(p1.fragment); let cPg = c.lastElementChild, cBox = cPg.querySelector('.page-content'), mH = 670 - cPg.querySelector('.salutation-display').offsetHeight; if(!bTxt) { scalePages(); return; } let tks = bTxt.split(/([ \t]+|\n)/); for(let i=0; i<tks.length; i++) { if(!tks[i]) continue; let tn = document.createTextNode(tks[i]); cBox.appendChild(tn); if(cBox.offsetHeight > mH) { cBox.removeChild(tn); let nPg = createBlankPage(); nPg.metaContainer.style.display = 'none'; nPg.salutationDisplay.style.display = 'none'; c.appendChild(nPg.fragment); cPg = c.lastElementChild; cBox = cPg.querySelector('.page-content'); mH = 770; if(tks[i] !== '\n') cBox.appendChild(tn); } } scalePages(); }

/* CM015 - Modal Auth Logic */
function askPassword() { document.getElementById('passwordModal').style.display = 'flex'; setTimeout(() => document.getElementById('passInput').focus(), 100); }
function closeModal() { document.getElementById('passwordModal').style.display = 'none'; document.getElementById('passInput').value = ''; document.getElementById('errorMsg').classList.add('hidden'); }
function validatePassword() { if(document.getElementById('passInput').value === "8800") { closeModal(); setTimeout(() => window.print(), 300); } else { document.getElementById('errorMsg').classList.remove('hidden'); document.getElementById('passInput').value = ''; document.getElementById('passInput').focus(); } }

/* CM016 - Event Listeners */
window.addEventListener('resize', scalePages);
document.getElementById('passInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') validatePassword(); });
window.onload = function() { document.getElementById('extSalutation').value = "To,\nManager,\nOrganization Name,\nVillage"; document.getElementById('extBody').value = "Start typing your official correspondence here...\n\nAs you type more text and reach the bottom of the page, watch the application intelligently detect the boundary and automatically generate a second page to continue your flow seamlessly."; buildDocument(); };
</script>
</body>
</html>
